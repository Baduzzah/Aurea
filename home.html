<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Estudos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="visu.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-left">
            <span><img src="./imgas/logo.png" style="width: 60px; padding-top: 5px;" alt="📘"></span>
            <span style="font-family: Tanmeringue, sans-serif; font-size: 30px; color: #6e1fff;">Aurea</span>
        </div>
        <div class="navbar-right">
            <button onclick="showSection('perfil')"><i class="fa-solid fa-user icon-btn"></i></button>
            <button id="notif-btn"><i class="fa-solid fa-bell icon-btn"></i></button>
        </div>
    </nav>

    <!-- notificações pop -->
    <div id="notif-pop" class="notif-pop" style="display:none;">
        <h3>Notificações</h3>
        <ul>
            <li>Nova mensagem no grupo de Estudos</li>
            <li>Você foi adicionado a um mapa mental</li>
        </ul>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <center>
            <fieldset>
                <button onclick="displaygrupo()" style="width:188px;position:relative; top: -15px;">Grupos de
                    Estudos</button>
                <div id="grup" style="display: none;">
                    <div>
                        <ul id="task-table"></ul>
                    </div>
                    <button id="add" style="border-radius: 100px;"><b>+</b></button>
                    <div id="pop" style="display: none;">
                        <input type="text" id="novo_grupo" placeholder="Nome do Grupo">
                        <button id="add_novo">criar</button>
                    </div>
                </div>
            </fieldset>
            <br><br>
            <fieldset>
                <button style="width:188px;position:relative; top: -15px;" onclick="displaymapas()">Mapas
                    Mentais</button>
                <div id="mapas" style="display: none;">
                    <div>
                        <ul id="mapa-table"></ul>
                    </div>
                    <button id="add-mapas" style="border-radius: 100px;">+</button>
                    <div id="pop-mapas" style="display: none;">
                        <input type="text" id="novo_mapa" placeholder="Nome do Mapa Mental">
                        <button id="add_novo_mapa">criar</button>
                    </div>
                </div>
            </fieldset>

            <div style="position: fixed; bottom: 0;">
                <button onclick="location.href='config.html'"><i class="fa-solid fa-gear icon-btn" style="font-size: 24px;"></i></button>
                <button class="theme-toggle" onclick="toggleTheme()">Alternar Tema</button>
            </div>
        </center>
    </div>

    <div class="main">
        <h1>Bem-vindo ao Aurea!</h1>
        <p>Seu facilitador de vida universitária</p>
        <br>
        <div class='title'>Dashboard</div>
        <div class='grid'>
            <div class='card' onclick="location.href='tapa_buraco.html'">Notas</div>
            <div class='card' onclick="location.href='tapa_buraco.html'">Agenda</div>
            <div class='card' onclick="location.href='https://www.canva.com'">Mapa Mental</div>
            <div class='card' onclick="location.href='tapa_buraco.html'">Faltas</div>
        </div>
    </div>

    <script src="scripiti.js"></script>
</body>

</html>
