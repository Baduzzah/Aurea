<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="visu.css">
    <link rel="stylesheet" href="materia.css">
    <link rel="stylesheet" href="notas.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-left">
            <span><img src="./imgas/logo.png" style="width: 60px;" alt="📘"></span>
            <span style="font-family: Tanmeringue, sans-serif; font-size: 30px; color: #6e1fff;">Aurea</span>
        </div>
        <div class="navbar-right">
            <span id="usuario-exibido">Ana</span>
            <button><a href="config.html" style="color: white;"><i class="fa-solid fa-user icon-btn"
                        onclick="location.href='config.html'"></i></a></button>
            <button id="notif-btn"><i class="fa-solid fa-bell icon-btn"></i></button>
        </div>
    </nav>

    <!-- notificações pop -->
    <div id="notif-pop" class="notif-pop" style="display:none;">
        <h3>Notificações</h3>
        <ul>
            <li>Nova mensagem no grupo de Estudos</li>
            <li>Você foi adicionado a um mapa mental</li>
        </ul>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <center>
            <fieldset>
                <button onclick="displaygrupo()" style="width:188px;position:relative; top: -15px;">Grupos de
                    Estudos</button>
                <div id="grup" style="display: none;">
                    <div>
                        <ul id="task-table"></ul>
                    </div>
                    <button id="add" style="border-radius: 100px;"><b>+</b></button>
                    <div id="pop" style="display: none;">
                        <input type="text" id="novo_grupo" placeholder="Nome do Grupo">
                        <button id="add_novo">criar</button>
                    </div>
                </div>
            </fieldset>
            <br><br>
            <fieldset>
                <button style="width:188px;position:relative; top: -15px;" onclick="displaymapas()">Mapas
                    Mentais</button>
                <div id="mapas" style="display: none;">
                    <div>
                        <ul id="mapa-table"></ul>
                    </div>
                    <button id="add-mapas" style="border-radius: 100px;">+</button>
                    <div id="pop-mapas" style="display: none;">
                        <input type="text" id="novo_mapa" placeholder="Nome do Mapa Mental">
                        <button id="add_novo_mapa">criar</button>
                    </div>
                </div>
            </fieldset>

            <div style="position: fixed; bottom: 0;">
                <button onclick="location.href='config.html'"><i class="fa-solid fa-gear"></i></button> <button
                    onclick="location.href='home.html'"><i class="fa-solid fa-house icon-btn"></i></button> <br> <button
                    class="theme-toggle" onclick="toggleTheme()">Alternar Tema</button>
            </div>
        </center>
    </div>

    <!-- MAIN -->
    <main class="main container-fluid mt-3">
        <div class="row">
            <!-- COLUNA NOTAS -->
            <div class="col-md-6">
                <h2 class="title">Notas</h2>
                <fieldset style="padding: 5px; background-color: var(--bg2);">
                    <button id="btnAddNota" class="btn btn-primary mt-3">Adicionar Nota</button>
                    <br><br>
                    <div id="notas-list" class="d-flex flex-column gap-3"></div>
                </fieldset>

            </div>



            <!-- COLUNA TRABALHOS -->
            <div class="col-md-4">
                <h2 class="title">Trabalhos</h2>
                <fieldset style="padding: 5px; background-color: var(--bg2);">
                    <button id="btnAddTrabalho" class="btn btn-primary mt-3">Adicionar Trabalho</button>
                    <br><br>
                    <div id="trabalhos-list" class="d-flex flex-column gap-3"></div>
                </fieldset>

            </div>

            <!-- COLUNA RESUMO -->
            <div class="col-md-2">
                <div id="resumo-dia" class="resumo-card"></div>
            </div>
        </div>
    </main>

    <!-- Modal Notas -->
    <div class="modal fade" id="notaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form id="notaForm" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar / Editar Nota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="nota-index" />
                    <div class="mb-3">
                        <label class="form-label">Matéria</label>
                        <input id="nota-materia" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prova 1</label>
                        <input id="nota-prova1" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prova 2</label>
                        <input id="nota-prova2" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trabalho</label>
                        <input id="nota-trabalho" class="form-control" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success" type="submit">Salvar</button>
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Trabalhos -->
    <div class="modal fade" id="trabalhoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form id="trabalhoForm" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar / Editar Trabalho</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="trabalho-index" />
                    <div class="mb-3">
                        <label class="form-label">Matéria</label>
                        <input id="trabalho-materia" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input id="trabalho-nome" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data de Entrega</label>
                        <input id="trabalho-data" type="date" class="form-control" required />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success" type="submit">Salvar</button>
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="notas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="faltas.js"></script>
    <script src="scripiti.js"></script>
    <script src="materia.js"></script>
</body>

</html>
