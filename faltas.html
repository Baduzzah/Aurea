<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Estudos - Faltas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="visu.css">
   
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-left">
            <span><img src="./imgas/logo.png" style="width: 60px;" alt="📘"></span>
            <span style="font-family: Tanmeringue, sans-serif; font-size: 30px; color: #6e1fff;">Aurea</span>
        </div>
        <div class="navbar-right">
            <span id="usuario-exibido">Ana</span>
            <button><a href="config.html" style="color: white;"><i class="fa-solid fa-user icon-btn"
                        onclick="location.href='config.html'"></i></a></button>
            <button id="notif-btn"><i class="fa-solid fa-bell icon-btn"></i></button>
        </div>
    </nav>

    <!-- notificações pop -->
    <div id="notif-pop" class="notif-pop" style="display:none;">
        <h3>Notificações</h3>
        <ul>
            <li>Nova mensagem no grupo de Estudos</li>
            <li>Você foi adicionado a um mapa mental</li>
        </ul>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <center>
            <fieldset>
                <button onclick="displaygrupo()" style="width:188px;position:relative; top: -15px;">Grupos de
                    Estudos</button>
                <div id="grup" style="display: none;">
                    <div>
                        <ul id="task-table"></ul>
                    </div>
                    <button id="add" style="border-radius: 100px;"><b>+</b></button>
                    <div id="pop" style="display: none;">
                        <input type="text" id="novo_grupo" placeholder="Nome do Grupo">
                        <button id="add_novo">criar</button>
                    </div>
                </div>
            </fieldset>
            <br><br>
            <fieldset>
                <button style="width:188px;position:relative; top: -15px;" onclick="displaymapas()">Mapas
                    Mentais</button>
                <div id="mapas" style="display: none;">
                    <div>
                        <ul id="mapa-table"></ul>
                    </div>
                    <button id="add-mapas" style="border-radius: 100px;">+</button>
                    <div id="pop-mapas" style="display: none;">
                        <input type="text" id="novo_mapa" placeholder="Nome do Mapa Mental">
                        <button id="add_novo_mapa">criar</button>
                    </div>
                </div>
            </fieldset>

            <div style="position: fixed; bottom: 0;">
                <button onclick="location.href='config.html'"><i class="fa-solid fa-gear"></i></button> <button
                    onclick="location.href='home.html'"><i class="fa-solid fa-house icon-btn"></i></button> <br> <button
                    class="theme-toggle" onclick="toggleTheme()">Alternar Tema</button>
            </div>
        </center>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="title">Faltas</div>
        <center><br><button id="btnAddMateria">+ Nova Matéria</button><br><br></center>
        <div id="faltas-grid" class="row g-4">
            <!-- caixas das matérias são renderizadas pelo JS -->
        </div>
    </div>

    <!-- MODAL EDITAR -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Matéria</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="edit-index">
                        <div class="mb-3">
                            <label class="form-label">Nome da Matéria</label>
                            <input type="text" class="form-control" id="edit-nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total de Aulas</label>
                            <input type="number" class="form-control" id="edit-total" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Faltas</label>
                            <input type="number" class="form-control" id="edit-faltas" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripiti.js"></script>
    <script src="faltas.js"></script>
</body>

</html>
